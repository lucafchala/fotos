version: 2
updates:
  # Keep the dev toolchain (wrangler, eslint) patched, including security fixes.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  # Keep GitHub Actions (checkout, wrangler-action, setup-node, codeql) current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
