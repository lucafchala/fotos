name = "fotos"
main = "src/index.js"
compatibility_date = "2024-11-01"
account_id = "e5869d6881e992cf4681ce85583a6ab2"

[[kv_namespaces]]
binding = "FOTOS"
id = "4d2c399e77804f3a82b66e4ec0a7fa5e"

# Image-use consent audit log (Part 5). Each acceptance of the Terms before Drive
# access is recorded here (schema in migrations/0001_consent.sql). Removing this
# binding makes env.CONSENT_DB undefined and consent logging a safe no-op.
[[d1_databases]]
binding = "CONSENT_DB"
database_name = "fotos-consent"
database_id = "d6bed362-4ddf-459d-a088-48b42aa11fdc"
migrations_dir = "migrations"

[triggers]
# Daily 03:00 UTC — purge resolved removal requests + expired consent rows.
crons = ["0 3 * * *"]

[env.preview]
name = "fotos-preview"

[[env.preview.kv_namespaces]]
binding = "FOTOS"
id = "4d2c399e77804f3a82b66e4ec0a7fa5e"
